# TestRun template. Per-scenario values from runs/<app>/<scenario>.env;
# per-environment TARGET_URL + PROMETHEUS_RW_URL from the shell.
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: ${LOAD_TEST_NAME}
  labels:
    app.kubernetes.io/name: loadtest
    app.kubernetes.io/instance: ${LOAD_TEST_NAME}
    app.kubernetes.io/component: ${SCENARIO}
    app.kubernetes.io/part-of: mijn-bureau
    testid: ${LOAD_TEST_NAME}
    runid: ${RUN_ID}
    target_vus: "${TARGET_VUS}"
spec:
  parallelism: ${PARALLELISM}
  # testid drives the run picker in the k6 Grafana dashboard (19665).
  arguments: --tag testid=${LOAD_TEST_NAME}
  script:
    configMap:
      name: ${SCRIPTS_CONFIGMAP}
      file: ${SCRIPT_FILE}
  runner:
    image: grafana/k6:0.57.0
    # Do not add runAsNonRoot: kubelet rejects it because grafana/k6's USER is
    # non-numeric. OpenShift's SCC mutator pins runAsUser at admission.
    securityContext:
      seccompProfile:
        type: RuntimeDefault
    env:
      - name: TARGET_URL
        value: "${TARGET_URL}"
      - name: K6_OUT
        value: experimental-prometheus-rw
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "${PROMETHEUS_RW_URL}"
      - name: K6_PROMETHEUS_RW_TREND_STATS
        value: "p(50),p(95),p(99),min,max,avg"
      # Load knobs read by the scenarios (ramp→plateau); empty falls back to script defaults.
      - name: TARGET_VUS
        value: "${TARGET_VUS}"
      - name: RAMP_UP
        value: "${RAMP_UP}"
      - name: HOLD
        value: "${HOLD}"
      # Seed/unseed knobs (seed.ts).
      - name: SEED_MODE
        value: "${SEED_MODE}"
      - name: SEED_DOC_COUNT
        value: "${SEED_DOC_COUNT}"
    envFrom:
      - secretRef:
          name: ${CREDENTIALS_SECRET}
    resources:
      requests:
        cpu: ${RUNNER_CPU_REQUEST}
        memory: ${RUNNER_MEMORY_REQUEST}
      limits:
        cpu: ${RUNNER_CPU_LIMIT}
        memory: ${RUNNER_MEMORY_LIMIT}
