# Egress/ingress allow rules. MijnBureau clusters default-deny both.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loadtest-egress
  labels:
    app.kubernetes.io/name: loadtest
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS — egress matches the post-DNAT pod port: kind CoreDNS binds 53,
    # OpenShift CoreDNS binds 5353.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    # k6-operator starter → runner REST API
    - to:
        - podSelector: {}
      ports:
        - port: 6565
          protocol: TCP
    # HTTPS target apps + HTTPS remote-write endpoints
    - ports:
        - port: 443
          protocol: TCP
    # Plain-HTTP Prometheus remote-write (sidecar Prometheus)
    - ports:
        - port: 9090
          protocol: TCP
---
# Intra-namespace ingress: starter → runner 6565, k6/grafana → Prometheus 9090.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loadtest-ingress
  labels:
    app.kubernetes.io/name: loadtest
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
